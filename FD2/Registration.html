<body>
    <h1>Novell Service Login</h1>
    <form>
        Username:
    <label><input type="text">

    <label><input type="Password">
        <br><br>

        <label><input type="text">

            <option>server 1</option>
            <option>server 2</option>
            <option>server 3</option>

        <br><br>
        <input type="submit"value="Login">
        <input type="reset"value="Reset">
        




    </form>
