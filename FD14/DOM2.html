<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Example</title>
</head>
<body>
    <p id="paragraph">
    This is my DOM Example
    </p>
    <img id = photo src="https://images.unsplash.com/photo-1781438587437-c0e4cb48be70?w=1000&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHw3N3x8fGVufDB8fHx8fA%3D%3D
    " alt="">

    <script>
        //js code
        // selectors
        let paragraph=document.querySelector("#paragraph");
        paragraph.innerHTML="This is my Second DOM Class";
        paragraph.style.color="red";
        paragraph.style.border="5px solid black";
        paragraph.style.backgroundColor="yellow";
        let photo = document.querySelector("#photo");
        photo.style.height="500px";
        photo.style.width="400px";

    
    </script>
    
</body>
</html>
